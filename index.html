<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc Thi Tốt!</title>
    <style>
        /* --- PHẦN CSS ĐÃ ĐƯỢC GỘP VÀ SỬA LỖI --- */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            font-family: 'Arial', sans-serif;
            overflow: hidden; 
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            animation: fadeIn 2s ease-in-out;
        }

        #e {
            width: 800px;
            max-width: 90%; 
            height: auto;   
            animation: bounce 1s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-family: 'font', Arial, sans-serif; /* Thêm font dự phòng */
            padding: 0 15px; /* Giúp chữ trên điện thoại không sát lề */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        .grass-rain {
            width: 100%;
            max-width: 1000px;
            height: 400px;
            pointer-events: none; 
            position: absolute; 
            top: 0;
        }

        .grass {
            position: absolute;
            width: 70px; 
            height: 70px;
            border-radius: 50%;
            pointer-events: none; 
            animation: fall 10s linear infinite; 
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px);
                opacity: 0; 
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(800px);
                opacity: 0; 
            }
        }

        @font-face {
            font-family: 'font';
            src: url('./tainguyen/font.ttf') format('truetype');
            font-weight: 400;
        }

        #main {
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50; 
        }

        #Button {
            position: absolute; 
            padding: 15px 30px; 
            font-size: 1rem;
            color: #ff7e5f;
            background-color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease; 
            z-index: 100;
        }

        #Button:hover {
            transform: scale(1.1);
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Đã thêm onerror để nếu thiếu file e.jpg thì sẽ hiện ảnh xám tạm thời, tránh bị lỗi giao diện -->
        <img src="./tainguyen/e.jpg" alt="logo" id="e" onerror="this.onerror=null; this.src='https://placehold.co/800x400/ff7e5f/white?text=Ảnh+logo+của+bạn';">
        <h1 id="txt1">Nghe nói mai bạn thi rồi đúng không?</h1>
        <h1 id="txt2">Nếu vậy thì...</h1>
        <h1 id="txt3">Tớ sẽ tặng cho cậu </h1>
        <h1 id="txtRain">Một Cơn Mưa </h1>
        <div class="grass-rain" id="grassRain"></div>
        <h1 id="txt4">Chúc cậu thật nhiều may mắn nhé!</h1>
        <h1 id="txt5">Cố gắng lên! Try your best!!</h1>
        
        <div id="main">
            <button id="Button"> Ấn vào đây để nhận thêm quà </button>
        </div>

        <video id="video" width="100%" height="100%" controls muted style="display: none; position: absolute; z-index: 900; background: black;">
            <source src="./tainguyen/video2.mp4" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ video.
        </video>
    </div>

    <script>
        var elements = [
            document.getElementById('e'),
            document.getElementById('txt1'),
            document.getElementById('txt2'),
            document.getElementById('txt3'),
            document.getElementById('txtRain'),
            document.getElementById('grassRain'),
            document.getElementById('txt4'),
            document.getElementById('txt5'),
            document.getElementById('main'),
        ];

        var grassRain = document.getElementById('grassRain');
        var flowerImages = [
            './tainguyen/clover.png',
            './tainguyen/clover3.png',
        ];

        function createFlowers() {
            for (var i = 0; i < 50; i++) { 
                var flower = document.createElement('img');
                flower.src = flowerImages[Math.floor(Math.random() * flowerImages.length)];
                flower.classList.add('grass'); 
                flower.style.left = Math.random() * 100 + '%'; 
                flower.style.animationDuration = (Math.random() * 5 + 3) + 's'; 
                
                flower.onerror = function() {
                    this.onerror = null; // Tránh loop nếu link này cũng lỗi
                    this.src = 'https://cdn-icons-png.flaticon.com/512/1004/1004860.png'; 
                };
                grassRain.appendChild(flower); 
            }
        }

        // Ẩn tất cả ban đầu
        elements.forEach(function(element) {
            element.style.display = 'none';
        });

        // Đã giảm tốc độ (từ 1500 xuống 800) để test nhanh hơn đỡ sốt ruột
        var delay = 800; 

        function showElement(index) {
            if (index >= elements.length) return;

            var element = elements[index];
            var currentDelay = (element.id === 'grassRain') ? 3000 : delay;

            elements.forEach(function(e) {
                e.style.display = 'none';
            });

            element.style.display = (element.id === 'main') ? 'flex' : 'block';

            if (element.id === 'grassRain') {
                createFlowers();
            }

            setTimeout(function() {
                showElement(index + 1);
            }, currentDelay);
        }

        // Bắt đầu chuỗi hiệu ứng
        showElement(0);

        // Hiệu ứng chạy trốn của nút
        var button = document.getElementById('Button');
        var hoverCount = 0;

        function moveButton() {
            if (!window.matchMedia('(max-width: 768px)').matches) {
                button.addEventListener('mouseenter', function() {
                    if (hoverCount < 5) {
                        var containerRect = document.querySelector('.container').getBoundingClientRect();
                        var buttonRect = button.getBoundingClientRect();

                        var maxX = containerRect.width - buttonRect.width - 20; 
                        var maxY = containerRect.height - buttonRect.height - 20;

                        if (maxX > 0 && maxY > 0) {
                            var randomX = Math.floor(Math.random() * maxX);
                            var randomY = Math.floor(Math.random() * maxY);

                            button.style.left = randomX + 'px';
                            button.style.top = randomY + 'px';
                            hoverCount++;
                        }
                    }
                });
            }
        }

        moveButton();

        // Xử lý khi nhấn nút thành công
        button.addEventListener('click', function() {
            var video = document.getElementById('video');
            video.style.display = 'block';
            
            // Bắt lỗi khi play() thất bại (thiếu file video2.mp4 hoặc trình duyệt chặn)
            var playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(function(error) {
                    console.log("Video không tự động phát được hoặc file không tồn tại.", error);
                    // Lỗi này giờ đã được bắt lại để không làm crash (sập) web
                });
            }
            
            button.style.display = 'none';

            var exit = document.createElement('button');
            exit.innerHTML = 'Khấn Online';
            exit.style.position = 'absolute';
            exit.style.top = '20px';
            exit.style.right = '20px'; 
            exit.style.zIndex = '1000';
            exit.style.padding = '10px 40px';
            exit.style.border = 'none';
            exit.style.borderRadius = '5px';
            exit.style.backgroundColor = '#f00';
            exit.style.color = '#fff';
            exit.style.cursor = 'pointer';
            exit.style.fontWeight = 'bold';

            document.body.appendChild(exit);
            exit.addEventListener('click', function() {
                // Chuyển trực tiếp sang trang khanonline.html
                document.location.href = 'khanonline.html';
            });
        });
    </script>
</body>
</html>
