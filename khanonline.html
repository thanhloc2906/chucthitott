<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khấn Online</title>
    <style>
        /* --- GỘP CSS CỦA KHANONLINE --- */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a; /* Nền tối tâm linh */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* Khung bọc ảnh và nút chuyển trang để chúng đứng cạnh nhau */
        .image-area {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* CHỈNH ẢNH THẮP HƯƠNG NHỎ LẠI */
        .image-area img {
            max-width: 250px; /* Giảm kích thước ảnh bát hương xuống (bạn có thể thay đổi số này) */
            height: auto;
            display: block;
            border-radius: 10px;
            margin: 0 auto; /* Căn giữa ảnh */
        }

        /* CSS NÚT CHUYỂN TRANG MỚI THEO STYLE CŨ */
        #chuyentrang {
            opacity: 0; /* Ẩn đi chờ gọi hồn */
            pointer-events: none; /* Không cho bấm khi đang ẩn */
            position: absolute;
            top: -40px; /* Vị trí gốc như bạn muốn ban đầu */
            right: 0px; /* Căn mép phải của ảnh */
            padding: 8px 15px;
            background-color: #4CAF50; /* Màu xanh lá chuẩn */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            transform: translateY(20px); /* Lùi xuống một chút để lát bật lên */
            transition: background-color 0.3s;
        }

        #chuyentrang.show-btn {
            pointer-events: auto; /* Cho phép bấm */
            animation: slideUpFade 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #chuyentrang:hover {
            background-color: #45a049;
        }

        @keyframes slideUpFade {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        #nhap {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #ccc;
            outline: none;
            margin-bottom: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        #nhap:focus {
            border-color: #ff7e5f;
            box-shadow: 0 0 8px rgba(255, 126, 95, 0.5);
        }

        #Button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff416c; /* Màu hồng gốc của nút Cầu nguyện */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #Button:hover {
            background-color: #ff4b2b;
            transform: scale(1.05);
        }

        #Button:disabled {
            background-color: #888;
            cursor: not-allowed;
            transform: none;
        }

        /* --- CSS CHO HỘP THOẠI DIALOG --- */
        .dialog {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s;
        }

        .dialog-content {
            background-color: #fff;
            margin: 20% auto;
            padding: 25px;
            border-radius: 12px;
            width: 80%;
            max-width: 350px;
            position: relative;
            text-align: center;
            font-size: 18px;
            line-height: 1.5;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .close {
            position: absolute;
            right: 15px;
            top: 10px;
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: #000;
            text-decoration: none;
        }

        /* --- HIỆU ỨNG ÔNG TIÊN HIỆN HỒN --- */
        #ongtien {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 9999;
            pointer-events: none;
            display: none; 
            max-width: 250px; /* Trả lại kích thước to như cũ cho Ông Tiên */
        }

        .hien-hon {
            animation: ghostAppear 2.5s ease-in-out forwards;
        }

        @keyframes ghostAppear {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.2); 
                filter: drop-shadow(0 0 0px rgba(255,255,255,0)); 
            }
            20% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.1); 
                filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); 
            }
            70% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1); 
                filter: drop-shadow(0 0 20px rgba(255,215,0,0.8)); 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -100%) scale(1.5); /* Trả lại độ phình to lúc bay đi như gốc */
                filter: drop-shadow(0 0 50px rgba(255,255,255,0)) blur(5px); 
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Khung chứa ảnh lư hương và nút chuyển trang bí mật -->
        <div class="image-area">
            <!-- Nút này đã được chỉnh lại style xanh lá và nhảy lên góc trên cùng bên phải -->
            <button id="chuyentrang">Dự đoán đề thi văn</button>
            
            <img src="./tainguyen/thaphuong.png" alt="Thắp hương" onerror="this.onerror=null; this.src='https://placehold.co/400x300/444/white?text=Ảnh+Thắp+Hương';">
        </div>
        
        <input id="nhap" type="text" placeholder="Nhập Nguyện Vọng Của Con Vào Đây...">
        <button id="Button">Cầu Nguyện</button>

        <!-- Dialog Box -->
        <div id="customDialog" class="dialog">
            <div class="dialog-content">
                <span class="close">&times;</span>
                <h3 style="color: #ff416c; margin-top: 0;">Truyền Âm!</h3>
                <p>Ta đã nhận được lời cầu nguyện của con.</p>
                <p><strong>Ta sẽ độ cho điều ước của con thành hiện thực. Yên tâm nhé!!</strong></p>
            </div>
        </div>
    </div>

    <!-- ẢNH ÔNG TIÊN ẨN -->
    <img id="ongtien" src="ongtien.png" alt="Ông Tiên" onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3069/3069172.png';">
     
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var Buttoncaunguyen = document.getElementById('Button');
            var dialog = document.getElementById('customDialog');
            var closeButton = document.querySelector('.close');
            var inputNguyenVong = document.getElementById('nhap');
            var chuyentrang = document.getElementById('chuyentrang');
            var ongtien = document.getElementById('ongtien');

            Buttoncaunguyen.addEventListener('click', function() {
                var nguyenVong = inputNguyenVong.value.trim();
                
                // 1. Kiểm tra xem đã nhập gì chưa
                if (nguyenVong === "") {
                    inputNguyenVong.style.border = "2px solid red";
                    inputNguyenVong.placeholder = "Khoan đã, con phải nhập nguyện vọng chứ!";
                    return; 
                }

                inputNguyenVong.style.border = "2px solid #ccc";

                // 2. Khóa nút bấm và input 
                Buttoncaunguyen.disabled = true;
                inputNguyenVong.disabled = true;

                // 3. GỌI ÔNG TIÊN VÀ HIỆN NÚT CHUYỂN TRANG
                ongtien.style.display = 'block';
                ongtien.classList.remove('hien-hon');
                void ongtien.offsetWidth; // reset animation
                ongtien.classList.add('hien-hon');
                
                // Kích hoạt class để nút hiện ra ở góc trên bên phải
                chuyentrang.classList.add('show-btn');

                // 4. Chờ 2.5 giây 
                setTimeout(function() {
                    // Ẩn ông tiên đi 
                    ongtien.style.display = 'none';
                    
                    // Hiện hộp thoại thông báo
                    dialog.style.display = 'block';
                    
                    Buttoncaunguyen.disabled = false;
                    inputNguyenVong.disabled = false;
                    inputNguyenVong.value = "";
                    inputNguyenVong.placeholder = "Nhập Nguyện Vọng Của Con Vào Đây...";
                }, 2500); 
            });

            closeButton.addEventListener('click', function() {
                dialog.style.display = 'none';
            });

            window.addEventListener('click', function(event) {
                if (event.target == dialog) {
                    dialog.style.display = 'none';
                }
            });

            chuyentrang.addEventListener('click', function() {
                document.location.href = 'randomdethivan.html';
            });
        });
    </script>
</body>
</html>
